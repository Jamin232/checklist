<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>客服总体核查 Checklist</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:#f5f6fa;color:#222;padding-bottom:40px}
.header{background:linear-gradient(135deg,#5b21b6,#7c3aed);color:#fff;padding:20px 16px;text-align:center}
.header h1{font-size:20px;font-weight:700;margin-bottom:4px}
.header .sub{font-size:13px;opacity:.85}

/* 日期导航 */
.date-nav{display:flex;align-items:center;justify-content:center;gap:16px;padding:12px 16px;background:#fff;margin:10px;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.date-nav button{width:36px;height:36px;border-radius:50%;border:1px solid #ddd;background:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#555}
.date-nav button:active{background:#f0f0f0}
.date-label{font-size:16px;font-weight:600;color:#333;min-width:160px;text-align:center}
.today-btn{font-size:12px;color:#5b21b6;border:1px solid #5b21b6;border-radius:14px;padding:4px 12px;background:#fff;cursor:pointer}
.today-btn:active{background:#ede9fe}

.stats-bar{display:flex;gap:8px;margin:0 10px 10px}
.stat-card{flex:1;background:#fff;border-radius:10px;padding:14px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.stat-card .num{font-size:24px;font-weight:700}
.stat-card .label{font-size:11px;color:#888;margin-top:2px}
.stat-card.done .num{color:#059669}
.stat-card.todo .num{color:#dc2626}
.stat-card.rate .num{color:#5b21b6}

.content{margin:0 10px}

/* 事项卡片 */
.item-card{background:#fff;border-radius:10px;padding:12px 16px;margin-bottom:6px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.item-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.item-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.item-name{font-size:14px;font-weight:600;flex:1}
.item-stats{font-size:11px;color:#888}

/* 勾选框行 */
.check-rows{display:flex;flex-wrap:wrap;gap:8px}
.check-row{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:8px;background:#f8f9fc;cursor:pointer;transition:all .15s}
.check-row:hover{background:#ede9fe}
.check-row.checked{background:#d1fae5}
.check-row input[type=checkbox]{width:18px;height:18px;accent-color:#5b21b6;cursor:pointer;flex-shrink:0}
.check-person{font-size:13px;color:#555}
.check-row.checked .check-person{color:#059669;font-weight:500}
.check-status{font-size:11px;color:#059669;display:none}
.check-row.checked .check-status{display:inline}

.legend{font-size:11px;color:#aaa;text-align:center;padding:12px}
.footer{text-align:center;padding:16px;color:#aaa;font-size:12px}
.empty-hint{text-align:center;padding:30px;color:#aaa;font-size:13px}
</style>
</head>
<body>
<div class="header"><h1>📊 客服总体核查</h1><div class="sub">多人协同 · 云端同步</div></div>

<div class="date-nav">
  <button onclick="prevDay()">‹</button>
  <span class="date-label" id="dateLabel">--</span>
  <button onclick="nextDay()">›</button>
  <button class="today-btn" onclick="goToday()">今天</button>
</div>

<div class="stats-bar">
  <div class="stat-card done"><div class="num" id="doneNum">0</div><div class="label">已完成</div></div>
  <div class="stat-card todo"><div class="num" id="todoNum">0</div><div class="label">待检查</div></div>
  <div class="stat-card rate"><div class="num" id="rateNum">--</div><div class="label">完成率</div></div>
</div>

<div class="content" id="content"></div>

<div class="legend">每项权重均等 · 多人负责项按人数均摊 · 勾选即保存</div>
<div class="footer">数据实时同步至 Supabase</div>

<script>
const SUPABASE_URL='https://epxnyyqaddvtdtkunccg.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVweG55eXFhZGR2dGR0a3VuY2NnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzNzc1MDgsImV4cCI6MjA5NTk1MzUwOH0.HnTG2XlNFNd_WA6WJ8MSHsZKOJ6DfWvEoJq3UA0r2qQ';

// 事项定义：每个事项在一个具体天的负责人
// day: 1=周一...5=周五, isMonthly, persons: 当天负责人列表
const ITEMS = [
  {id:1, name:'【仓库操作记录】检查', day:1, persons:['Miya']},
  {id:2, name:'【解冻订单】检查', day:1, persons:['Jeslyn']},
  {id:3, name:'【销售结算账单完成情况】检查', day:1, persons:['Maggie']},
  {id:4, name:'【减结算价】分析', day:1, persons:['Wendy']},
  {id:5, name:'【拼车分析】分析', day:1, persons:['Maggie']},
  {id:6, name:'【补录审批】审批', day:1, persons:['Wendy','Miya']},
  {id:7, name:'【机器人审核、检查】检查', day:1, persons:['Miya']},
  {id:8, name:'【异常件】质检', day:2, persons:['Maggie','Miya','Wendy','Abby']},
  {id:6, name:'【补录审批】审批', day:2, persons:['Wendy','Miya']},
  {id:7, name:'【机器人审核、检查】检查', day:2, persons:['Maggie']},
  {id:9, name:'【在仓货物提醒-播报群】检查Cathy是否发出', day:2, persons:['Miya']},
  {id:10, name:'【货拉拉充值】统筹+申请', day:2, persons:['Jeslyn']},
  {id:3, name:'【销售结算账单完成情况】检查', day:3, persons:['Abby']},
  {id:6, name:'【补录审批】审批', day:3, persons:['Wendy','Miya']},
  {id:11, name:'【机器人通知】配置', day:3, persons:['Maggie']},
  {id:7, name:'【机器人审核、检查】检查', day:3, persons:['Abby']},
  {id:9, name:'【在仓货物提醒-播报群】检查Cathy是否发出', day:4, persons:['Abby']},
  {id:6, name:'【补录审批】审批', day:4, persons:['Wendy','Miya']},
  {id:7, name:'【机器人审核、检查】检查', day:4, persons:['Jeslyn']},
  {id:3, name:'【销售结算账单完成情况】检查', day:5, persons:['Miya']},
  {id:7, name:'【机器人审核、检查】检查', day:5, persons:['Maggie']},
  {id:10, name:'【货拉拉充值】统筹+申请', day:5, persons:['Jeslyn']},
  {id:6, name:'【补录审批】审批', day:5, persons:['Wendy','Miya']},
  {id:12, name:'【待确认/待交寄/退货订单】费用改零', isMonthly:true, monthlyDay:15, persons:['Jeslyn']},
  {id:13, name:'车队账单放共享表并监督核对', isMonthly:true, monthlyDay:15, persons:['Maggie','Wendy']}
];

let selectedDate=null;
const DAY_NAMES=['','周一','周二','周三','周四','周五','周六','周日'];

function getWorkdayForMonthDay(year,month,day){
  let d=new Date(year,month-1,day);
  let dow=d.getDay();
  if(dow===0) d.setDate(d.getDate()-2);
  else if(dow===6) d.setDate(d.getDate()-1);
  return d;
}

function getDateKey(d){
  let dt=new Date(d);
  dt.setHours(0,0,0,0);
  let y=dt.getFullYear();
  let m=String(dt.getMonth()+1).padStart(2,'0');
  let dd=String(dt.getDate()).padStart(2,'0');
  return `${y}-${m}-${dd}`;
}

function getDateLabel(dk){
  let dt=new Date(dk+'T00:00:00');
  let m=dt.getMonth()+1;
  let dd=dt.getDate();
  let dow=dt.getDay();
  let dowName=DAY_NAMES[dow===0?7:dow];
  return `${m}月${dd}日 ${dowName}`;
}

function prevDay(){
  let d=new Date(selectedDate+'T00:00:00');
  d.setDate(d.getDate()-1);
  selectedDate=getDateKey(d);
  render();
}

function nextDay(){
  let d=new Date(selectedDate+'T00:00:00');
  d.setDate(d.getDate()+1);
  selectedDate=getDateKey(d);
  render();
}

function goToday(){
  selectedDate=getDateKey(new Date());
  render();
}

async function apiFetch(method, path, body){
  let headers={'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY};
  if(body){headers['Content-Type']='application/json';headers['Prefer']='return=minimal';}
  let r=await fetch(SUPABASE_URL+'/rest/v1/'+path,{method,headers,body:body?JSON.stringify(body):undefined});
  if(!r.ok){let t=await r.text();throw new Error(t);}
  if(r.status===204||r.headers.get('content-length')==='0')return null;
  return r.json();
}

async function toggleCheck(checkKey, checked){
  try{
    await apiFetch('PATCH','ganghou_zonghe_checklist?check_key=eq.'+encodeURIComponent(checkKey),{checked,updated_at:new Date().toISOString()});
  }catch(e){
    await apiFetch('POST','ganghou_zonghe_checklist',{check_key:checkKey,checked,updated_at:new Date().toISOString()});
  }
}

async function render(){
  let dateKey=selectedDate;
  document.getElementById('dateLabel').textContent=getDateLabel(dateKey);
  let today=new Date(dateKey+'T00:00:00');
  let dow=today.getDay();
  let dayNum=dow===0?7:dow; // 1=周一...7=周日

  // 收集当天事项
  let todayItems=[];

  for(let item of ITEMS){
    if(item.isMonthly){
      // 月度事项：判断是否落在今天
      let md=getWorkdayForMonthDay(today.getFullYear(), today.getMonth()+1, item.monthlyDay);
      if(getDateKey(md)===dateKey){
        todayItems.push({...item});
      }
    }else{
      // 日常事项：匹配星期几
      if(item.day===dayNum){
        todayItems.push({...item});
      }
    }
  }

  // 收集所有check_key
  let allKeys=[];
  let allItems=[];

  for(let it of todayItems){
    for(let p of it.persons){
      let key=`${dateKey}_i${it.id}_${p}`;
      allKeys.push(key);
      allItems.push({item:it, person:p, key});
    }
  }

  // 批量查询
  let checkedMap={};
  if(allKeys.length>0){
    try{
      let orFilter=allKeys.map(a=>'check_key.eq.'+encodeURIComponent(a)).join(',');
      let rows=await apiFetch('GET','ganghou_zonghe_checklist?select=check_key,checked&or=('+orFilter+')');
      if(rows){for(let r of rows)checkedMap[r.check_key]=r.checked;}
    }catch(e){console.error(e);}
  }

  // 统计
  let uniqueItemIds=[...new Set(allItems.map(a=>a.item.id))];
  let totalItems=uniqueItemIds.length;

  let itemRates={};
  for(let iid of uniqueItemIds){
    let checks=allItems.filter(a=>a.item.id===iid);
    let done=checks.filter(a=>checkedMap[a.key]).length;
    itemRates[iid]=checks.length>0?done/checks.length:0;
  }
  let overallRate=totalItems>0
    ? Object.values(itemRates).reduce((a,b)=>a+b,0)/totalItems
    : 0;
  let doneItems=Object.values(itemRates).reduce((a,b)=>a+b,0);

  document.getElementById('doneNum').textContent=doneItems.toFixed(1);
  document.getElementById('todoNum').textContent=(totalItems-doneItems).toFixed(1);
  document.getElementById('rateNum').textContent=Math.round(overallRate*100)+'%';

  // 渲染
  let html='';

  if(todayItems.length===0){
    html='<div class="empty-hint">今日无检查事项</div>';
  }else{
    for(let it of todayItems){
      let itemChecks=allItems.filter(a=>a.item.id===it.id);
      let itemDone=itemChecks.filter(a=>checkedMap[a.key]).length;
      let itemTotal=itemChecks.length;
      let allDone=itemDone===itemTotal;
      let anyDone=itemDone>0;

      html+=`<div class="item-card">
        <div class="item-header">
          <div class="item-dot" style="background:${allDone?'#059669':anyDone?'#f59e0b':'#d1d5db'}"></div>
          <div class="item-name">${it.name}</div>
          <div class="item-stats">${itemDone}/${itemTotal}</div>
        </div>
        <div class="check-rows">`;

      for(let c of itemChecks){
        let ck=checkedMap[c.key]||false;
        html+=`<div class="check-row${ck?' checked':''}" onclick="handleCheck('${c.key}',${!ck})">
          <input type="checkbox" ${ck?'checked':''} onclick="event.stopPropagation();handleCheck('${c.key}',this.checked)">
          <span class="check-person">${c.person}</span>
          <span class="check-status">✓</span>
        </div>`;
      }
      html+=`</div></div>`;
    }
  }

  document.getElementById('content').innerHTML=html;
}

async function handleCheck(key, checked){
  await toggleCheck(key, checked);
  render();
}

selectedDate=getDateKey(new Date());
render();
</script>
</body>
</html>
