.badge-weekly{background:#e8f0fb;color:#1764e8}
.badge-priority{background:#fff3e0;color:#e65c00}
.progress-bar{height:3px;background:#f0f0f0;border-radius:2px;margin:0 14px 0}
.progress-fill{height:100%;background:#07c160;border-radius:2px;transition:width .3s}
.items{padding:4px 0}
.item{display:flex;align-items:flex-start;gap:10px;padding:9px 14px;border-bottom:0.5px solid #f5f5f5;cursor:pointer;transition:background .15s;-webkit-tap-highlight-color:transparent;user-select:none}
.item:last-child{border-bottom:none}
.item:active{background:#f9f9f9}
.item.done .item-text{color:#aaa;text-decoration:line-through}
.item.done .item-tag{opacity:.5}
.item.done .item-sub{color:#ccc}
.checkbox{width:20px;height:20px;border-radius:50%;border:1.5px solid #d0d0d0;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all .2s}
.checkbox.checked{background:#07c160;border-color:#07c160}
.checkbox.checked::after{content:'';width:5px;height:9px;border:1.5px solid #fff;border-top:none;border-left:none;transform:rotate(45deg) translateY(-1px);display:block}
.item-content{flex:1;min-width:0}
.item-text{font-size:13px;line-height:1.5;color:#222}
.item-sub{font-size:11px;color:#999;margin-top:2px;line-height:1.4}
.item-tag{display:inline-block;font-size:10px;padding:1px 5px;border-radius:3px;margin-right:4px;vertical-align:middle}
.tag-time{background:#fff3cd;color:#9a6c00}
.tag-resp{background:#e8eafd;color:#3651d4}
.tag-green{background:#e8f7ef;color:#07a64a}
.tag-red{background:#feebeb;color:#d62929}
.tag-orange{background:#fff0e0;color:#c95c00}
.pane{display:none}
.pane.active{display:block}
.day-selector{display:flex;gap:6px;padding:8px 10px;background:#fff;overflow-x:auto;border-bottom:0.5px solid #f0f0f0;position:sticky;top:80px;z-index:8;-webkit-overflow-scrolling:touch}

.day-btn{flex-shrink:0;padding:5px 12px;border-radius:14px;font-size:12px;background:#f5f5f5;color:#555;cursor:pointer;border:0.5px solid transparent;transition:all .15s;-webkit-tap-highlight-color:transparent}
.day-btn.active{background:#e8f7ef;color:#07a64a;border-color:#b2e5c9}

.empty-hint{text-align:center;padding:24px 0;color:#aaa;font-size:12px}
.reset-btn{font-size:11px;color:#999;padding:2px 8px;border:0.5px solid #ddd;border-radius:10px;background:#fff;cursor:pointer}

async function apiFetch(method,path,body){
  const r=await fetch(`${SUPABASE_URL}/rest/v1${path}`,{
    method,headers:{
      'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,
      'Content-Type':'application/json','Prefer':'return=representation'
    },body:body?JSON.stringify(body):undefined
  });
  if(!r.ok){console.error('API error',r.status);return null}
  const txt=await r.text();
  return txt?JSON.parse(txt):null;
}

async function loadFromCloud(){
  try{
    const rows=await apiFetch('GET','/checklist_state?select=check_key,checked');
    if(!rows)return;
    state={};
    rows.forEach(r=>{state[r.check_key]=r.checked});
  }catch(e){console.error('Load error',e)}
}

async function toggleCheck(key){
  const newVal=!state[key];
  // 乐观更新UI
  state[key]=newVal;

  // 同步到云端 (upsert)
  try{
    await apiFetch('POST','/checklist_state',{
      check_key:key,checked:newVal,updated_at:new Date().toISOString()
    });
  }catch(e){
    // 失败时回滚
    state[key]=!newVal;
    console.error('Sync error',e);
  }
}

function getCheck(key){return !!state[key]}

function weekKey(d){

  return `${mon.getFullYear()}-W${String(Math.ceil((((mon-new Date(mon.getFullYear(),0,1))/86400000)+1)/7)).padStart(2,'0')}`;

function formatDate(d){

function getStateKey(tab,dayKey,itemId){
  return `${tab}|${dayKey}|${itemId}`;
}

function renderSection(sec,tab,dayKey){
  const ids=sec.items.map(i=>i.id);
  const done=ids.filter(id=>getCheck(getStateKey(tab,dayKey,id))).length;
  const total=ids.length;
  const pct=total>0?Math.round(done/total*100):0;
  let html=`<div class="section" id="sec-${sec.id}">
    <div class="section-header">
      <div class="section-title">
        ${sec.priority?'<span style="color:#e65c00;font-size:12px">★</span>':''}
        ${sec.title}
        <span class="badge badge-${sec.badge==='daily'?'daily':'weekly'}">${sec.badge==='daily'?'每日':('每周'+( sec.weekday?sec.weekday:''))}</span>
      </div>
      <span style="font-size:11px;color:#aaa">${done}/${total}</span>
    </div>
    <div class="progress-bar" style="margin-bottom:0"><div class="progress-fill" style="width:${pct}%"></div></div>`;
  if(sec.note){html+=`<div class="section-note">${sec.note}</div>`}
  html+=`<div class="items">`;
  sec.items.forEach(item=>{
    const key=getStateKey(tab,dayKey,item.id);
    const checked=getCheck(key);
    html+=`<div class="item${checked?' done':''}" onclick="toggle('${tab}','${dayKey}','${item.id}','${sec.id}')">
      <div class="checkbox${checked?' checked':''}"></div>
      <div class="item-content">
        <div class="item-text">
          ${item.time?`<span class="item-tag tag-time">${item.time}</span>`:''}
          ${item.text}
        </div>
        ${item.sub||item.resp?`<div class="item-sub">
          ${item.resp?`<span class="item-tag tag-resp">${PEOPLE[item.resp]||item.resp}</span>`:''}
          ${item.sub||''}
        </div>`:''}
      </div>
    </div>`;
  });
  html+=`</div></div>`;
  return html;
}

function toggle(tab,dayKey,itemId,secId){
  const key=getStateKey(tab,dayKey,itemId);
  toggleCheck(key);
  renderTab(tab,true);
  renderSummary(tab,dayKey);
}

function getDayRange(tab){
  const today=new Date();
  const days=[];
  if(tab==='daily'){
    // 显示本月所有日期 + 前后各2天
    const curMonth=new Date(today.getFullYear(), today.getMonth(), 1);
    const nextMonth=new Date(today.getFullYear(), today.getMonth()+1, 1);
    const start=new Date(curMonth); start.setDate(start.getDate()-2);
    const end=new Date(nextMonth); end.setDate(end.getDate()+2);
    const d=new Date(start);
    while(d<=end){
      const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      const isToday=k===todayKey();
      days.push({key:k,label:isToday?`今天 ${d.getMonth()+1}/${d.getDate()}`:formatDate(k)});
      d.setDate(d.getDate()+1);
    }
  }else{
    // 显示本月所有周 + 前后各1周
    const curMonth=new Date(today.getFullYear(), today.getMonth(), 1);
    const nextMonth=new Date(today.getFullYear(), today.getMonth()+1, 1);
    // 找本月第一周的周一
    const firstWeekMon=new Date(curMonth);
    const fd=firstWeekMon.getDay();
    firstWeekMon.setDate(firstWeekMon.getDate()-(fd===0?6:fd-1));
    // 找下月最后一周的周日
    const lastWeekSun=new Date(nextMonth);
    lastWeekSun.setDate(lastWeekSun.getDate()+6);
    const d=new Date(firstWeekMon);
    let wk=0;
    while(d<lastWeekSun){
      const k=weekKey(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`);
      const endD=new Date(d);endD.setDate(d.getDate()+6);
      const isCurrentWeek=k===weekKey(todayKey());
      const label=isCurrentWeek?`本周 ${d.getMonth()+1}/${d.getDate()}-${endD.getMonth()+1}/${endD.getDate()}`:`${d.getMonth()+1}/${d.getDate()}-${endD.getMonth()+1}/${endD.getDate()}`;
      days.push({key:k,label});
      d.setDate(d.getDate()+7);
      wk++;
    }
  }
  return days;
}

function renderDaySelector(tab){
  const days=getDayRange(tab);
  const containerId=tab==='daily'?'dailyDays':tab==='weekly'?'weeklyDays':'waipeiDays';
  const container=document.getElementById(containerId);
  container.innerHTML=days.map(d=>`<div class="day-btn${d.key===selectedDay[tab]?' active':''}" onclick="selectDay('${tab}','${d.key}')">${d.label}</div>`).join('');
  // 自动滚动到选中项
  requestAnimationFrame(()=>{
    const active=container.querySelector('.day-btn.active');
    if(active) active.scrollIntoView({block:'nearest',inline:'center',behavior:'smooth'});
  });
}

function selectDay(tab,key){
  selectedDay[tab]=key;
  renderTab(tab,true);
}

function getSections(tab){
  if(tab==='daily')return DAILY_SECTIONS;
  if(tab==='weekly')return WEEKLY_SECTIONS;
  return WAIPEI_SECTIONS;
}

function renderSummary(tab,dayKey){
  const sections=getSections(tab);
  const allItems=sections.flatMap(s=>s.items);
  const total=allItems.length;
  const done=allItems.filter(i=>getCheck(getStateKey(tab,dayKey,i.id))).length;
  const pending=total-done;
  const summaryId=tab==='daily'?'dailySummary':tab==='weekly'?'weeklySummary':'waipeiSummary';
  document.getElementById(summaryId).innerHTML=`
    <div class="summary-card"><div class="summary-num" style="color:#07c160">${done}</div><div class="summary-label">已完成</div></div>
    <div class="summary-card"><div class="summary-num" style="color:#e65c00">${pending}</div><div class="summary-label">待核查</div></div>
    <div class="summary-card"><div class="summary-num" style="color:#1764e8">${total>0?Math.round(done/total*100):0}%</div><div class="summary-label">完成率</div></div>
  `;
}

function renderTab(tab,preserveScroll){
  const sections=getSections(tab);
  const dayKey=selectedDay[tab];
  const contentId=tab==='daily'?'dailyContent':tab==='weekly'?'weeklyContent':'waipeiContent';
  const scrollY=preserveScroll?window.scrollY:0;
  renderDaySelector(tab);
  document.getElementById(contentId).innerHTML=sections.map(s=>renderSection(s,tab,dayKey)).join('');
  renderSummary(tab,dayKey);
  if(!preserveScroll)window.scrollTo(0,0);
  else window.scrollTo(0,scrollY);
}

function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach((el,i)=>{
    el.classList.toggle('active',['daily','weekly','waipei'][i]===tab);
  });
  document.querySelectorAll('.pane').forEach((el,i)=>{
    el.classList.toggle('active',['daily','weekly','waipei'][i]===tab);
  });
  renderTab(tab,false);
}

function updateHeaderDate(){
  const d=new Date();
  const wds=['周日','周一','周二','周三','周四','周五','周六'];
  document.getElementById('headerDate').textContent=`${d.getFullYear()}.${d.getMonth()+1}.${d.getDate()} ${wds[d.getDay()]}`;
}

async function init(){
  await loadFromCloud();
  updateHeaderDate();
  renderTab('daily',false);
  setInterval(updateHeaderDate,60000);
}
init();
</script>
</body>
</html>
