<!DOCTYPE html>

<title>Checklist 总入口</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:#f5f6fa;color:#222;padding-bottom:20px}
.header{background:linear-gradient(135deg,#333,#111);color:#fff;padding:20px 16px;text-align:center}
.header h1{font-size:20px;font-weight:700;margin-bottom:4px}
.header .sub{font-size:13px;opacity:.7}
.dept-section{margin:12px 10px}
.dept-header{display:flex;align-items:center;gap:8px;padding:10px 4px 6px}
.dept-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dept-title{font-size:16px;font-weight:700;color:#222}
.dept-sub{font-size:11px;color:#999;margin-left:4px}
.group-section{padding:0}
.group-card{display:flex;align-items:center;justify-content:space-between;background:#fff;margin-bottom:6px;padding:14px 16px;border-radius:10px;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.06);transition:all .15s;text-decoration:none;color:inherit}
.group-card:active{background:#f5f8ff;transform:scale(.98)}
.group-card .left{display:flex;align-items:center;gap:10px}
.group-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.icon-dakehu{background:#fee2e2;color:#b91c1c}
.icon-yizu{background:#fff3cd;color:#92400e}
.icon-erzu{background:#dbeafe;color:#1e40af}
.icon-sanuz{background:#d1fae5;color:#065f46}
.icon-ganghou{background:#ede9fe;color:#5b21b6}
.group-name{font-size:15px;font-weight:600}
.group-members{font-size:12px;color:#888;margin-top:2px}
.arrow{color:#ccc;font-size:18px}
.footer{text-align:center;padding:20px;color:#aaa;font-size:12px}
</style>
</head>
